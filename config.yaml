# AI Morning Editor — パーソナライズ設定
# コンセプト資料の「初回だけAI編集長が質問する」に相当する部分。
# ここを書き換えるだけで翌朝から編集方針が変わる。

reader:
  # 朝のニュース時間(分): 3 / 5 / 10 / 15
  minutes: 5

  # 興味分野(優先順)
  interests:
    - AI
    - ビジネス
    - 世界情勢
    - 日本

  # 重点的にウォッチしたい領域
  watch_domains:
    - エンタープライズSaaS・業務システムベンダー
      （ServiceNow, SAP, Salesforce, Microsoft, Oracle, Workday 等）
    - データ・アナリティクス基盤ベンダー
      （Palantir, Snowflake, Databricks, Qlik 等）
    - グローバルITサービス・コンサルティング
      （IBM, Accenture, Capgemini 等）
    - 国内大手SIer・ITベンダー
      （富士通, 日立, NEC, NTTデータ, 野村総研 等）
    - クラウド・インフラ基盤
      （AWS, Google Cloud, Azure 等）

  # 上記領域から最低限確保する記事本数
  watch_min_count: 2

  # 職業・役割(仕事に関係するニュースを優先表示)
  profession: "IT(エンタープライズアーキテクト / IT戦略)"

  # 深さ: 結論だけ / 背景まで / 専門家レベル
  depth: 背景まで

brief:
  # トップ以外に載せるニュース本数
  story_count: 5

  # 出力言語
  language: 日本語

site:
  title: "AI Morning Editor"
  # GitHub Pages公開URL(通知のクリック先にも使う)
  page_url: "https://takamasasaito.github.io/morning-editor/"

audio:
  # VOICEVOX話者ID(比較試聴用に切替可)
  # 3=ずんだもんノーマル / 1=ずんだもんあまあま / 2=四国めたんノーマル
  speaker_id: 3
  speed_scale: 1.1
  voicevox_host: "http://localhost:50021"
